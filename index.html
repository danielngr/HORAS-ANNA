<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horas — Registro de Trabajo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #EDEAE2;
    --card: #FFFFFF;
    --text: #1A1814;
    --text-muted: #8C8880;
    --accent: #2D4A3E;
    --accent-light: #4A7A67;
    --danger: #8B3A3A;
    --border: #D8D4CC;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-nav button {
    background: none;
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .month-nav button:hover {
    background: var(--surface);
    color: var(--text);
  }

  #current-month-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    min-width: 110px;
    text-align: center;
  }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* SUMMARY CARD */
  .summary-card {
    background: var(--accent);
    border-radius: 16px;
    padding: 24px;
    color: white;
  }

  .summary-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 4px;
  }

  .summary-hours {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 20px;
  }

  .summary-hours span {
    font-size: 20px;
    opacity: 0.6;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .summary-item {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .summary-item .s-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .summary-item .s-value {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
  }

  .summary-item .s-value.positive { color: #7ECBA1; }
  .summary-item .s-value.negative { color: #F4A8A8; }

  /* CONTRACT SETTINGS */
  .settings-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .settings-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .settings-header span {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }

  .settings-header .chevron {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }

  .settings-header.open .chevron { transform: rotate(180deg); }

  .settings-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }

  .settings-body.open { display: block; }

  .contract-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .input-group input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .input-group input:focus { border-color: var(--accent-light); }

  /* REGISTER SECTION */
  .register-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 18px;
  }

  .register-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-bottom: 14px;
  }

  .register-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .time-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .time-btn:hover { border-color: var(--accent-light); background: #F0F5F3; }

  .time-btn .tb-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .time-btn .tb-time {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
  }

  .time-btn.entrada .tb-label { color: var(--accent-light); }
  .time-btn.salida .tb-label { color: var(--danger); }

  .manual-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    align-items: end;
  }

  .manual-row input[type="time"] {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    padding: 9px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .manual-row input[type="date"] {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    padding: 9px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    grid-column: 1 / -1;
  }

  .manual-row input:focus { border-color: var(--accent-light); }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { background: var(--accent-light); }

  /* ENTRIES LIST */
  .entries-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .entries-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .entries-header span {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .entries-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 20px;
    color: var(--text-muted);
  }

  .entries-list {
    max-height: 380px;
    overflow-y: auto;
  }

  .entry-item {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-item:last-child { border-bottom: none; }

  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 70px;
  }

  .entry-times {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
  }

  .entry-times .arrow { color: var(--text-muted); font-size: 10px; }

  .entry-total {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    min-width: 45px;
    text-align: right;
  }

  .entry-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 14px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .entry-delete:hover { color: var(--danger); }

  .empty-state {
    padding: 40px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .emoji { font-size: 28px; margin-bottom: 8px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Divider */
  .or-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin: 10px 0 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="logo">⏱ Registro</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div id="current-month-label">—</div>
    <button onclick="changeMonth(1)">›</button>
  </div>
</header>

<main>

  <!-- SUMMARY -->
  <div class="summary-card">
    <div class="summary-label">Horas trabajadas</div>
    <div class="summary-hours" id="total-hours">0<span>h 00m</span></div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="s-label">Contrato</div>
        <div class="s-value" id="contract-display">—</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Extras</div>
        <div class="s-value" id="extras-display">—</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Días</div>
        <div class="s-value" id="days-display">0</div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-card">
    <div class="settings-header" onclick="toggleSettings(this)">
      <span>⚙ Configuración de contrato</span>
      <span class="chevron">▼</span>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="contract-grid">
        <div class="input-group">
          <label>Horas/semana</label>
          <input type="number" id="hours-week" value="40" min="1" max="60" step="0.5" oninput="saveSettings(); updateSummary()">
        </div>
        <div class="input-group">
          <label>Semanas/mes</label>
          <input type="number" id="weeks-month" value="4.33" min="1" max="6" step="0.01" oninput="saveSettings(); updateSummary()">
        </div>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="register-card">
    <div class="register-title">Registrar ahora</div>
    <div class="register-row">
      <button class="time-btn entrada" onclick="stampTime('entrada')">
        <div class="tb-label">▶ Entrada</div>
        <div class="tb-time" id="stamp-entrada">--:--</div>
      </button>
      <button class="time-btn salida" onclick="stampTime('salida')">
        <div class="tb-label">■ Salida</div>
        <div class="tb-time" id="stamp-salida">--:--</div>
      </button>
    </div>

    <div class="or-divider">o añadir manualmente</div>

    <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;">
      <div style="flex:1">
        <label style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block">Fecha</label>
        <input type="date" id="manual-date" onchange="updateDateHint()" style="width:100%;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:9px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;">
      </div>
      <span id="date-hint" style="font-size:11px;color:var(--accent-light);font-family:'DM Mono',monospace;margin-top:18px;white-space:nowrap;"></span>
    </div>
    <div class="manual-row">
      <div class="input-group" style="margin:0">
        <label style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block">Entrada</label>
        <input type="time" id="manual-entrada">
      </div>
      <div class="input-group" style="margin:0">
        <label style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block">Salida</label>
        <input type="time" id="manual-salida">
      </div>
      <button class="add-btn" onclick="addManual()">+ Añadir</button>
    </div>
  </div>

  <!-- ENTRIES -->
  <div class="entries-card">
    <div class="entries-header">
      <span>Registros del mes</span>
      <span class="entries-count" id="entries-count">0 días</span>
    </div>
    <div class="entries-list" id="entries-list">
      <div class="empty-state">
        <div class="emoji">🕐</div>
        Sin registros este mes
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let currentYear, currentMonth;
  let stampEntrada = null, stampSalida = null;

  const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  // ── INIT ──
  function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    loadSettings();
    setDefaultDate();
    updateMonthLabel();
    renderEntries();
    updateSummary();
  }

  function setDefaultDate() {
    const now = new Date();
    document.getElementById('manual-date').value = now.toISOString().slice(0,10);
    updateDateHint();
  }

  function updateDateHint() {
    const dateVal = document.getElementById('manual-date').value;
    const hint = document.getElementById('date-hint');
    if (!dateVal) { hint.textContent = ''; return; }
    const d = new Date(dateVal + 'T00:00:00');
    const entryYear = d.getFullYear();
    const entryMonth = d.getMonth();
    const now = new Date();
    if (entryYear === now.getFullYear() && entryMonth === now.getMonth()) {
      hint.textContent = '';
    } else {
      hint.style.color = 'var(--accent-light)';
      hint.textContent = `→ ${MONTHS[entryMonth]} ${entryYear}`;
    }
  }

  // ── STORAGE KEY ──
  function storageKey() {
    return `work-tracker-${currentYear}-${currentMonth}`;
  }

  function getEntries() {
    return JSON.parse(localStorage.getItem(storageKey()) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(storageKey(), JSON.stringify(entries));
  }

  // ── SETTINGS ──
  function loadSettings() {
    const s = JSON.parse(localStorage.getItem('work-tracker-settings') || '{}');
    if (s.hoursWeek) document.getElementById('hours-week').value = s.hoursWeek;
    if (s.weeksMonth) document.getElementById('weeks-month').value = s.weeksMonth;
  }

  function saveSettings() {
    localStorage.setItem('work-tracker-settings', JSON.stringify({
      hoursWeek: document.getElementById('hours-week').value,
      weeksMonth: document.getElementById('weeks-month').value
    }));
  }

  function toggleSettings(el) {
    el.classList.toggle('open');
    document.getElementById('settings-body').classList.toggle('open');
  }

  // ── MONTH NAV ──
  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    updateMonthLabel();
    renderEntries();
    updateSummary();
  }

  function updateMonthLabel() {
    document.getElementById('current-month-label').textContent =
      `${MONTHS[currentMonth]} ${currentYear}`;
  }

  // ── STAMP TIME ──
  function stampTime(type) {
    const now = new Date();
    const hhmm = now.toTimeString().slice(0,5);
    if (type === 'entrada') {
      stampEntrada = hhmm;
      document.getElementById('stamp-entrada').textContent = hhmm;
      showToast(`Entrada: ${hhmm}`);
    } else {
      stampSalida = hhmm;
      document.getElementById('stamp-salida').textContent = hhmm;
      if (stampEntrada) {
        const today = now.toISOString().slice(0,10);
        addEntry(today, stampEntrada, stampSalida);
        stampEntrada = null; stampSalida = null;
        document.getElementById('stamp-entrada').textContent = '--:--';
        document.getElementById('stamp-salida').textContent = '--:--';
      } else {
        showToast('Registra primero la entrada ↑');
      }
    }
  }

  // ── MANUAL ADD ──
  function addManual() {
    const date = document.getElementById('manual-date').value;
    const entrada = document.getElementById('manual-entrada').value;
    const salida = document.getElementById('manual-salida').value;
    if (!date || !entrada || !salida) { showToast('Completa todos los campos'); return; }
    // Allow overnight shifts: if salida <= entrada, assume next day
    const [eh, em] = entrada.split(':').map(Number);
    const [sh, sm] = salida.split(':').map(Number);
    const entradaMins = eh * 60 + em;
    const salidaMins = sh * 60 + sm;
    // Only block if same time exactly
    if (entradaMins === salidaMins) { showToast('La entrada y salida no pueden ser iguales'); return; }
    addEntry(date, entrada, salida);
    document.getElementById('manual-entrada').value = '';
    document.getElementById('manual-salida').value = '';
  }

  function addEntry(date, entrada, salida) {
    const d = new Date(date + 'T00:00:00');
    const entryYear = d.getFullYear();
    const entryMonth = d.getMonth();

    // Save to the correct month's storage key (may differ from current view)
    const key = `work-tracker-${entryYear}-${entryMonth}`;
    const entries = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = entries.findIndex(e => e.date === date);
    const item = { date, entrada, salida };
    if (idx >= 0) entries[idx] = item;
    else entries.push(item);
    entries.sort((a,b) => a.date.localeCompare(b.date));
    localStorage.setItem(key, JSON.stringify(entries));

    // If the saved date belongs to a different month, offer to navigate there
    const isSameMonth = entryYear === currentYear && entryMonth === currentMonth;
    const monthName = MONTHS[entryMonth];
    if (!isSameMonth) {
      showToast(`Guardado en ${monthName} ${entryYear} ✓ — usa ‹ › para verlo`);
    } else {
      renderEntries();
      updateSummary();
      showToast('Registro guardado ✓');
    }
  }

  // ── RENDER ──
  function renderEntries() {
    const entries = getEntries();
    const list = document.getElementById('entries-list');
    document.getElementById('entries-count').textContent =
      `${entries.length} día${entries.length !== 1 ? 's' : ''}`;

    if (!entries.length) {
      list.innerHTML = `<div class="empty-state"><div class="emoji">🕐</div>Sin registros este mes</div>`;
      return;
    }

    list.innerHTML = entries.map((e, i) => {
      const mins = calcMins(e.entrada, e.salida);
      const h = Math.floor(mins/60);
      const m = mins % 60;
      const d = new Date(e.date + 'T00:00:00');
      const dayLabel = `${DAYS[d.getDay()]} ${d.getDate()}`;
      return `
        <div class="entry-item">
          <div class="entry-date">${dayLabel}</div>
          <div class="entry-times">
            <span>${e.entrada}</span>
            <span class="arrow">→</span>
            <span>${e.salida}</span>
          </div>
          <div class="entry-total">${h}h${m > 0 ? m+'m' : ''}</div>
          <button class="entry-delete" onclick="deleteEntry(${i})" title="Eliminar">×</button>
        </div>`;
    }).join('');
  }

  function deleteEntry(i) {
    const entries = getEntries();
    entries.splice(i, 1);
    saveEntries(entries);
    renderEntries();
    updateSummary();
    showToast('Registro eliminado');
  }

  // ── SUMMARY ──
  function calcMins(h1, h2) {
    const [ah, am] = h1.split(':').map(Number);
    const [bh, bm] = h2.split(':').map(Number);
    let mins = (bh*60+bm) - (ah*60+am);
    if (mins <= 0) mins += 24 * 60; // overnight shift
    return mins;
  }

  function updateSummary() {
    const entries = getEntries();
    let totalMins = 0;
    entries.forEach(e => { totalMins += calcMins(e.entrada, e.salida); });

    const totalH = Math.floor(totalMins/60);
    const totalM = totalMins % 60;

    const hoursWeek = parseFloat(document.getElementById('hours-week').value) || 40;
    const weeksMonth = parseFloat(document.getElementById('weeks-month').value) || 4.33;
    const contractMins = Math.round(hoursWeek * weeksMonth * 60);

    const contractH = Math.floor(contractMins/60);
    const contractM = contractMins % 60;

    const extraMins = totalMins - contractMins;
    const extraH = Math.floor(Math.abs(extraMins)/60);
    const extraM = Math.abs(extraMins) % 60;
    const extraSign = extraMins >= 0 ? '+' : '-';

    document.getElementById('total-hours').innerHTML =
      `${totalH}<span>h ${totalM.toString().padStart(2,'0')}m</span>`;

    document.getElementById('contract-display').textContent =
      `${contractH}h${contractM > 0 ? contractM+'m' : ''}`;

    const extrasEl = document.getElementById('extras-display');
    extrasEl.textContent = `${extraSign}${extraH}h${extraM > 0 ? extraM+'m' : ''}`;
    extrasEl.className = 's-value ' + (extraMins >= 0 ? 'positive' : 'negative');

    document.getElementById('days-display').textContent = entries.length;
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  init();
</script>
</body>
</html>
